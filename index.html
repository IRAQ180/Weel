<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دولاب الأسماء</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom, #e0f2fe, #7dd3fc);
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #b91c1c;
            z-index: 10;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        button {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #0284c7;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" width="300" height="300"></canvas>
</div>
<button id="spin-btn" onclick="spinWheel()">🔄 تدوير الدولاب</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const chat_id = urlParams.get('chat_id');
    const namesParam = urlParams.get('names'); 
    
    let names = [];
    let current_users = [];

    if (namesParam) {
        const pairs = namesParam.split(',');
        pairs.forEach(pair => {
            const parts = pair.split('|');
            names.push(parts[0]);
            current_users.push(parts[1] || "");
        });
    } else {
        names = ["أحمد", "علي"];
        current_users = ["", ""];
    }

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    const center = size / 2;
    const slices = names.length;
    const arc = 2 * Math.PI / slices;

    const colors = ["#fbbf24", "#fb923c", "#f87171", "#f43f5e", "#c084fc", "#818cf8", "#60a5fa", "#34d399", "#4ade80", "#a3e635"];

    function drawWheel() {
        for (let i = 0; i < slices; i++) {
            const angle = i * arc;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.arc(center, center, center, angle, angle + arc);
            ctx.lineTo(center, center);
            ctx.fill();

            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 14px Arial";
            ctx.fillText(names[i], center - 20, 5);
            ctx.restore();
        }
    }

    drawWheel();

    let currentRotation = 0;
    function spinWheel() {
        document.getElementById('spin-btn').disabled = true;
        const extraDegrees = Math.floor(Math.random() * 360) + 1440; 
        currentRotation += extraDegrees;
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const actualRotation = (currentRotation % 360);
            const index = Math.floor(((360 - actualRotation + 90) % 360) / (360 / slices));
            const finalIndex = index % slices;
            
            const winnerName = names[finalIndex];
            const winnerUser = current_users[finalIndex];

            // تحضير رابط توجيه للبوت لإرسال النتيجة تلقائياً عند الضغط
            const botUsername = "8981280860"; // سيتم تحويله برمجياً داخل تليجرام
            const startParam = btoa(`${chat_id}_${winnerName}_${winnerUser}`).replace(/=/g, '');
            const shareUrl = `https://t.me/Roletalhdad_bot?start=${startParam}`; // ضع يوزر بوتك هنا بدلاً من sosiisoe_bot

            tg.showPopup({
                title: '🎉 انتهت القرعة!',
                message: `👤 الفائز المحظوظ هو: ${winnerName}\n\nاضغط على الزر أدناه لنشر النتيجة وإرسال المنشن داخل المجموعة فوراً!`,
                buttons: [
                    {id: 'share', type: 'default', text: '📣 نشر النتيجة في الجروب'},
                    {id: 'close', type: 'cancel', text: 'إغلاق'}
                ]
            }, function(buttonId) {
                if (buttonId === 'share') {
                    tg.openTelegramLink(shareUrl);
                }
                tg.close();
            });

        }, 4000); 
    }
</script>
</body>
</html>
