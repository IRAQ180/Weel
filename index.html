<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>دولاب الحظ</title>
    <!-- مكتبة تليجرام الأساسية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #e0f2fe; }
        .wheel-container { position: relative; width: 300px; height: 300px; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #b91c1c; z-index: 10; }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1); }
        button { margin-top: 30px; padding: 12px 30px; font-size: 18px; font-weight: bold; color: white; background-color: #0284c7; border: none; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" width="300" height="300"></canvas>
</div>
<button id="spin-btn" onclick="spinWheel()">🔄 تدوير الدولاب</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const namesParam = urlParams.get('names'); 
    
    let names = [];
    if (namesParam) {
        namesParam.split(',').forEach(pair => {
            names.push(pair.split('|')[0]);
        });
    } else {
        names = ["أحمد", "علي"];
    }

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const center = canvas.width / 2;
    const slices = names.length;
    const arc = 2 * Math.PI / slices;
    const colors = ["#fbbf24", "#fb923c", "#f87171", "#f43f5e", "#c084fc", "#818cf8"];

    function drawWheel() {
        for (let i = 0; i < slices; i++) {
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath(); ctx.moveTo(center, center);
            ctx.arc(center, center, center, i * arc, (i + 1) * arc);
            ctx.lineTo(center, center); ctx.fill();
            ctx.save(); ctx.translate(center, center); ctx.rotate((i * arc) + arc / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "#ffffff"; ctx.font = "bold 14px Arial";
            ctx.fillText(names[i], center - 20, 5); ctx.restore();
        }
    }
    drawWheel();

    let currentRotation = 0;
    function spinWheel() {
        document.getElementById('spin-btn').disabled = true;
        const extraDegrees = Math.floor(Math.random() * 360) + 1440; 
        currentRotation += extraDegrees;
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const actualRotation = (currentRotation % 360);
            const index = Math.floor(((360 - actualRotation + 90) % 360) / (360 / slices)) % slices;
            const winnerName = names[index];

            // إرسال النتيجة للبوت ليقوم بنشر التهنئة تلقائياً
            if (tg.sendData) {
                tg.sendData(JSON.stringify({ winner: winnerName }));
            }

            tg.showPopup({
                title: '🎉 مبروك الفائز!',
                message: `👤 ياحبيبي انتَ فائز: 【 ${winnerName} 】 ✨`,
                buttons: [{id: 'close', type: 'default', text: '🔙 العودة للمجموعة'}]
            }, function(buttonId) {
                tg.close();
            });
        }, 4000); 
    }
</script>
</body>
</html>
