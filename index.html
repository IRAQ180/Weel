<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #000; }
        /* هنا تظهر الـ GIF فقط */
        #wheel-gif { width: 300px; height: 300px; cursor: pointer; border-radius: 50%; transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1); }
    </style>
</head>
<body>

<img id="wheel-gif" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ4ZzR6ZzR6ZzR6ZzR6ZzR6ZzR6ZzR6ZzR6ZzR6ZzR6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif" onclick="spin()">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let rotation = 0;
    function spin() {
        document.getElementById('wheel-gif').onclick = null;
        rotation += 1800 + Math.random() * 1800;
        document.getElementById('wheel-gif').style.transform = `rotate(${rotation}deg)`;
        
        setTimeout(() => {
            if (tg.sendData) tg.sendData(JSON.stringify({ winner: "مبارك الفوز!" }));
            tg.showPopup({ title: '🎉 مبروك!', message: 'ياحبيبي انتَ فائز!' }, () => tg.close());
        }, 4000);
    }
</script>
</body>
</html>
